<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Internet hotspot - Error</title>
    <link rel="stylesheet" href="css/message.css">
</head>

<body>
    <div class="screen">
        <div class="bg">
            <picture>
                <source media="(orientation: landscape)" srcset="img/poster-landscape.jpg">
                <img class="bg-img" src="img/poster-portrait.jpg" alt="" />
            </picture>

            <div class="overlay">
                <div class="message">
                    <h1>Terjadi kesalahan</h1>
                    <p>$(error)</p>
                    <a class="btn-link" href="$(link-login)">Kembali ke halaman login</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
