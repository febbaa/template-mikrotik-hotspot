<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Internet hotspot - Redirect</title>
    <link rel="stylesheet" href="css/message.css">
    <script>
        function startClock() {
            $(if popup == 'true')
            open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
        $(endif)
        setTimeout(function () {
            location.href = unescape('$(link-redirect-esc)');
        }, 2000);
        }

    </script>
</head>

<body onLoad="startClock()">
    <div class="screen">
        <div class="bg">
            <picture>
                <source media="(orientation: landscape)" srcset="img/poster-landscape.jpg">
                <img class="bg-img" src="img/poster-portrait.jpg" alt="" />
            </picture>

            <div class="overlay">
                <div class="message">
                    <h1>Berhasil masuk!</h1>
                    <p>Mengalihkan halaman&hellip; jika tidak otomatis,</p>
                    <a class="btn-link" href="$(link-redirect)">klik di sini</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
