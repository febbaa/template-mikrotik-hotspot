<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet hotspot - Log in</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<!--
    LOGIN DISPLAY MODE
    ===================
    Change the class on the <body> tag below to choose what shows on the
    login panel:

        mode-full    -> show password field AND login button (default)
        mode-button  -> show login button only, password field hidden
        mode-hidden  -> hide both password field and login button;
                        users tap/click the poster image to log in instead

    POSTER IMAGE
    ============
    Replace img/poster.jpg with your own artwork. Use a portrait image
    (recommended ~900x1450px) for best results on mobile screens.
-->

<body class="mode-full">

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }

    </script>
    $(endif)

    <script>
        function prepareLogin() {
            document.login.username.value = document.login.password.value;
            return true;
        }

        function tapToConnect() {
            if (!document.body.classList.contains('mode-hidden')) return;
            prepareLogin();
            $(if chap-id)
            doLogin();
            $(else)
            document.login.submit();
            $(endif)
        }

    </script>

    <div class="screen">
        <div class="poster" onclick="tapToConnect()">
            <img src="img/poster.jpg" alt="" onerror="this.style.display='none';this.parentNode.classList.add('poster-empty')" />
        </div>

        <div class="panel">
            <form name="login" action="$(link-login-only)" method="post"
                onSubmit="prepareLogin(); $(if chap-id) return doLogin(); $(endif) return true;">
                <input type="hidden" name="username" value="$(username)" />
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />

                <p class="error-msg">$(if error)$(error)$(endif)</p>

                <input class="password-field" name="password" type="password" placeholder="Password" />

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="brand-logo"><span class="dot">P</span>Internet by Permana&middot;Net</div>
            <p class="tagline">Manjakan Harimu #SamaPermana</p>
        </div>
    </div>
</body>

</html>
